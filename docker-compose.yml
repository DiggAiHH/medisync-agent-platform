# MediSync Agenten-Plattform - Docker Compose
# Version: 1.0.0

version: '3.8'

services:
  # Redis - Message Queue & Caching
  redis:
    image: redis:7-alpine
    container_name: medisync-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - medisync-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medisync-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - WS_PORT=8080
      - REDIS_URL=redis://redis:6379
      - QUEUE_NAME=agent-jobs
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - medisync-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Worker - Job Processor
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: medisync-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - QUEUE_NAME=agent-jobs
      - WORKER_CONCURRENCY=5
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - worker_logs:/app/logs
    networks:
      - medisync-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # Discord Bot
  discord-bot:
    build:
      context: ./bot/discord
      dockerfile: Dockerfile
    container_name: medisync-discord-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_APPLICATION_ID=${DISCORD_APPLICATION_ID}
      - API_BASE_URL=http://backend:3000
      - WEBSOCKET_URL=ws://backend:8080
      - RATE_LIMIT_DELAY=1000
      - REQUEST_TIMEOUT=30000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - bot_logs:/app/logs
    networks:
      - medisync-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Dashboard (Static File Server)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: medisync-dashboard
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - medisync-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # Dead Letter Queue Handler (Optional)
  dlq-handler:
    build:
      context: ./backend
      dockerfile: Dockerfile.dlq
    container_name: medisync-dlq
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - QUEUE_NAME=agent-jobs
      - DLQ_ENABLED=true
      - DLQ_RETENTION_DAYS=30
      - NOTIFICATION_WEBHOOK=${DLQ_WEBHOOK_URL:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - dlq_logs:/app/logs
    networks:
      - medisync-network
    profiles:
      - production
      - monitoring

  # Prometheus Metrics (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: medisync-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - medisync-network
    profiles:
      - monitoring

  # Grafana Dashboards (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: medisync-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - medisync-network
    profiles:
      - monitoring

# Named Volumes
volumes:
  redis_data:
    driver: local
  backend_logs:
    driver: local
  worker_logs:
    driver: local
  bot_logs:
    driver: local
  dlq_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# Networks
networks:
  medisync-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
