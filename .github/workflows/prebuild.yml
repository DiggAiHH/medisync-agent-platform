# MediSync Agent Platform - Prebuild GitHub Action
# Automatisierte Erstellung und Aktualisierung von Codespace Prebuilds

name: Codespaces Prebuild

on:
  # Push auf main und develop branches
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  
  # Täglich um 3:00 UTC
  schedule:
    - cron: '0 3 * * *'
  
  # Manuelle Ausführung
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch für Prebuild'
        required: true
        default: 'main'
        type: string

# Konkurrenz-Handling: Breche laufende Workflows ab, wenn ein neuer Push erfolgt
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prebuild:
    name: Create Prebuild
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            dashboard/package-lock.json
            bot/discord/package-lock.json
            
      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
            
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          npm ci --silent
          npm run build
          
      - name: Install Dashboard Dependencies
        working-directory: ./dashboard
        run: |
          npm ci --silent
          npm run build
          
      - name: Install Discord Bot Dependencies
        working-directory: ./bot/discord
        run: |
          npm ci --silent
          npm run build
          
      - name: Verify Build Artifacts
        run: |
          echo "Checking build artifacts..."
          test -d backend/dist && echo "✓ Backend dist exists"
          test -d dashboard/dist && echo "✓ Dashboard dist exists"
          test -d bot/discord/dist && echo "✓ Bot dist exists"
          
      - name: Run Tests
        run: |
          echo "Running test suite..."
          cd backend && npm test --if-present
          cd ../dashboard && npm test --if-present
          cd ../bot/discord && npm test --if-present
        continue-on-error: true
        
      - name: Build VS Code Extension
        working-directory: ./code-server/extensions/medical-ai-extension
        run: |
          npm ci --silent
          npm run compile
          
      - name: Create Prebuild Summary
        run: |
          echo "# Codespaces Prebuild Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Backend: Built successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dashboard: Built successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Discord Bot: Built successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ VS Code Extension: Compiled successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Branch" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.event.inputs.branch || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Prebuild Benefits" >> $GITHUB_STEP_SUMMARY
          echo "- Schnellerer Codespace-Start (~2-3 Minuten statt 5-10 Minuten)" >> $GITHUB_STEP_SUMMARY
          echo "- Vorkompilierte Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "- Vorbereitete Build-Artefakte" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify on Failure
    needs: prebuild
    if: failure()
    runs-on: ubuntu-latest
    
    steps:
      - name: Create Issue on Failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Prebuild Failed: ${context.sha.substring(0, 7)}`;
            const body = `
            ## Prebuild Failure
            
            The Codespaces prebuild workflow failed for commit ${context.sha}.
            
            ### Details
            - **Branch:** ${context.ref}
            - **Commit:** ${context.sha}
            - **Workflow:** ${context.workflow}
            - **Run URL:** ${context.payload.repository.html_url}/actions/runs/${context.runId}
            
            ### Next Steps
            1. Check the workflow logs for errors
            2. Fix the underlying issue
            3. Re-run the workflow manually if needed
            
            ---
            *This issue was created automatically by the Prebuild workflow.*
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'prebuild', 'automated']
            });
